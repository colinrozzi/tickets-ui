# Plain self-contained build (packr 0.11.0). setup_guest!() links dlmalloc into
# the cdylib, so it exports its own GROWABLE memory + __pack_alloc/__pack_free +
# lifecycle and imports only host theater:simple/*. No fixed-base recipe, no
# packr::link composition, no capped heap — the resulting .wasm is directly
# loadable (no compose step).
#
# NOTE: the nix+crane build does NOT reliably honor this file — flake.nix passes
# the same two flags via CARGO_ENCODED_RUSTFLAGS. Keep the two in sync.
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "link-arg=--export-memory",
    "-C", "link-arg=--no-entry",
]
