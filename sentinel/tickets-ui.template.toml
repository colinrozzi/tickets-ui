# Sentinel-managed deploy template for tickets-ui.
#
# Sentinel renders this template by literal substring substitution of
# the placeholders below (each wrapped in doubled underscores) from
# its per-child config at every spawn:
#
# (Comment intentionally avoids writing example placeholder names in
# the doubled-underscore form — Phase 3.3's secret-validation regex
# scans the whole template for that pattern and would treat an example
# in a doc comment as a required secret. See inbox-acceptor.template.toml
# in the inbox repo for the same gotcha + the cutover that revealed it.)
#
#   children: {
#     "tickets-ui": {
#       manifest_template: <contents of this file>,
#       default_package:   "<canonical tickets_ui.wasm URL>",
#       secrets: {
#         "API_TOKEN": "<bearer the tickets API accepts>"
#       }
#     }
#   }
#
# OPERATOR NOTE — API_TOKEN:
#   The same bearer tickets-acceptor accepts in its api-bearer-token
#   store label. Set as a single-line string; no escape needed.
#   tickets-dev's 2026-06-05 reply is the source of truth on the
#   wire format; this UI only ever needs the one bearer.
#
# OPERATOR NOTE — PACKAGE:
#   For production, this should be the canonical release URL on
#   github.com/colinrozzi/tickets-ui/releases, e.g.
#     https://github.com/colinrozzi/tickets-ui/releases/download/release-YYYYMMDD-<sha>/tickets_ui-YYYYMMDD-<sha>.wasm
#   theater's resolve_reference fetches https:// URLs and feeds the
#   bytes to the wasm component loader.
#
# COEXISTENCE CONSTRAINT:
#   tickets-ui binds 127.0.0.1:9444. tickets-acceptor binds
#   127.0.0.1:8445 (its API listener). The two ports do not collide
#   and the actors share no store — tickets-ui reads + writes go
#   through the API exclusively (DESIGN.md §3, amended 2026-06-05).
#   NOTE (2026-07-05 public-URL cutover): the tickets API moved to :8445.
#   :8443 is now inbox-acceptor (mail HTTPS API), :8444 is sentinel's
#   command surface — do NOT point api_addr at either.
#
# WHY initial_state IS A SINGLE-LINE TOML LITERAL (not multi-line):
#   Sentinel embeds this entire template as a STRING value in its own
#   outer manifest, which itself uses TOML triple-quote literal syntax.
#   TOML literal strings have NO escape mechanism for nested triple
#   quotes — if this template uses triple-quote for its inner
#   initial_state, the outer parse closes the wrapping string early
#   ("expected newline" error at the inner triple-quote position).
#   The inbox cutover hit this exact bug on 2026-05-31. Keep
#   initial_state as a single-line single-quote literal. Don't
#   "improve readability" by re-introducing multi-line.
#
# server_tls — PRE-STAGED, HELD FOR THE tickets.colinrozzi.com CUTOVER:
#   Phase A brings tickets-ui up plaintext on loopback 127.0.0.1:9444
#   (frontdoor does not yet route the public hostname to it). The
#   [handler.server_tls] block below is the inbox-ui-style pre-stage so
#   the eventual public flip is a one-step render — it is NOT part of the
#   Phase A render.
#
#   SEQUENCING (per frontdoor-dev 2026-07-05): frontdoor SNI-routes the
#   RAW encrypted stream to this backend, so tickets-ui must terminate TLS
#   for tickets.colinrozzi.com on :9444 BEFORE frontdoor adds the route —
#   else every handshake fails at the backend. Order at cutover:
#     1. operator (claude) provisions the cert via certbot, exactly like
#        inbox.colinrozzi.com — expected at
#        /etc/letsencrypt/live/tickets.colinrozzi.com/{fullchain,privkey}.pem
#     2. sentinel renders this template WITH __CERT_PATH__/__KEY_PATH__ filled
#        and respawns tickets-ui (TLS now live on :9444)
#     3. frontdoor fires {op:upsert_route, hostname:tickets.colinrozzi.com,
#        backend:127.0.0.1:9444} to its :9100 control channel
#   The UI actor code does not change — theater terminates TLS at the tcp
#   handler; the actor still does plaintext tcp_receive/tcp_send.
#
#   The PR that adds this block is intentionally held out of the Phase A
#   render; it lands at the routing cutover.

name = "tickets-ui"
version = "0.1.0"
package = "__PACKAGE__"
static_package = true
# JSON shape (one-line for nesting-safety; see operator note above):
#   {
#     "api_addr":    "127.0.0.1:8445",
#     "api_token":   "<bearer>",
#     "listen_addr": "127.0.0.1:9444"
#   }
initial_state = '{"api_addr":"127.0.0.1:8445","api_token":"__API_TOKEN__","listen_addr":"127.0.0.1:9444"}'

[[handler]]
type = "runtime"

[[handler]]
type = "tcp"

# HELD FOR CUTOVER — see the "server_tls — PRE-STAGED" note above. This block
# makes theater terminate TLS for tickets.colinrozzi.com on the :9444 listener.
# __CERT_PATH__ / __KEY_PATH__ are filled by sentinel at the routing cutover
# (expected /etc/letsencrypt/live/tickets.colinrozzi.com/fullchain.pem and
# privkey.pem). Absent from the Phase A render, which stays plaintext.
[handler.server_tls]
enabled = true
cert = "__CERT_PATH__"
key = "__KEY_PATH__"
