name: Release

on:
  # Developer-initiated: `nix run .#release` from main creates and pushes
  # a release-YYYYMMDD-<sha7> tag. The tag push triggers this workflow.
  # No auto-trigger on every main commit — release is an explicit step.
  push:
    tags: ['release-*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build + tag + upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # packr 0.10.2 self-contained: the deployable artifact is the COMPOSITE
      # (actor member + packr bundled allocator, fused so memory + pack:alloc are
      # internalized and only host theater:simple/* imports remain). A bare
      # member is rejected by the 0.10.x loader's assert_self_contained.
      #
      # `theater build --release ui` runs cargo build (fixed-base recipe) then
      # composes + verifies in one step. The devShell provides the 0.10.2 theater
      # CLI + binaryen (wasm-merge) + wasm-tools + the rust wasm toolchain. cargo
      # runs on the runner (crates.io reachable), not in a nix sandbox.
      # CARGO_TARGET_DIR steers the workspace-member build into ui/target where
      # `theater build` expects it.
      - name: Build + compose the self-contained composite
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            export CARGO_TARGET_DIR="$PWD/ui/target"
            theater build --release ui
            C="ui/target/wasm32-unknown-unknown/release/tickets_ui.composite.wasm"
            test -f "$C" || { echo "::error::composite not emitted at $C"; exit 1; }
            echo "composite: $C ($(stat -c%s "$C") bytes)"
          '

      - name: Verify composite is self-contained (host-only imports)
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            C="ui/target/wasm32-unknown-unknown/release/tickets_ui.composite.wasm"
            wasm-tools validate "$C"
            bad=$(wasm-tools print "$C" | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
            if [ -n "$bad" ]; then echo "::error::non-host imports (not self-contained):"; echo "$bad"; exit 1; fi
            echo "all residual imports are host theater:simple/* — composite is self-contained"
          '

      - name: Create GitHub release and upload artifacts
        run: |
          # Tag was created and pushed by `nix run .#release`. For
          # workflow_dispatch runs synthesize the same shape from HEAD.
          if [ -n "$GITHUB_REF_NAME" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            DATE=$(date +%Y%m%d)
            SHA=$(git rev-parse --short=7 HEAD)
            TAG="release-$DATE-$SHA"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --generate-notes

          STAGE_TAG="${TAG#release-}"
          REPO="${{ github.repository }}"
          COMPOSITE="ui/target/wasm32-unknown-unknown/release/tickets_ui.composite.wasm"
          ASSETS=()

          # 1) Self-contained composite — the deployable artifact (packr 0.10.2).
          #    Sentinel's `package` field points here via the canonical URL.
          #    NOTE: this is the COMPOSITE, not a bare member (a bare member is
          #    rejected by the 0.10.x loader).
          cp "$COMPOSITE" "tickets_ui-${STAGE_TAG}.composite.wasm"
          chmod +w "tickets_ui-${STAGE_TAG}.composite.wasm"
          ASSETS+=("tickets_ui-${STAGE_TAG}.composite.wasm")

          # 2) Release-flavored manifest with a self-referential package URL
          #    pointing at this release's composite. Mirrors the in-repo
          #    ui/manifest.toml handler set. No initial_state — the spawner
          #    provides it (sentinel template / theater spawn API). No server_tls
          #    block — held for the tickets.colinrozzi.com routing cutover.
          UI_MANIFEST_FILE="tickets-ui-${STAGE_TAG}.toml"
          UI_WASM_URL="https://github.com/${REPO}/releases/download/${TAG}/tickets_ui-${STAGE_TAG}.composite.wasm"
          cat > "${UI_MANIFEST_FILE}" <<TOML
          name = "tickets-ui"
          version = "0.1.0"
          package = "${UI_WASM_URL}"
          static_package = true

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"
          TOML
          ASSETS+=("${UI_MANIFEST_FILE}")

          # 3) Bundle (humans / local use) + sha256.
          STAGE="tickets-ui-${STAGE_TAG}-wasm32"
          mkdir -p "$STAGE"
          cp "$COMPOSITE" "$STAGE/"
          chmod -R +w "$STAGE"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

          gh release upload "$TAG" "${ASSETS[@]}" "$STAGE.tar.gz" "$STAGE.tar.gz.sha256"
        env:
          GH_TOKEN: ${{ github.token }}
