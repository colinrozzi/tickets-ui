name: Release

on:
  # Developer-initiated: `nix run .#release` from main creates and pushes
  # a release-YYYYMMDD-<sha7> tag. The tag push triggers this workflow.
  # No auto-trigger on every main commit — release is an explicit step.
  push:
    tags: ['release-*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Build + tag + upload artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # packr 0.11.0 plain build (composition retired). setup_guest!() links
      # dlmalloc into the cdylib, so the actor exports its own growable memory +
      # __pack_alloc/__pack_free and imports only host theater:simple/*. The
      # resulting .wasm is DIRECTLY loadable — no compose step. `nix build`
      # applies the two link-args (--export-memory, --no-entry) via the flake's
      # CARGO_ENCODED_RUSTFLAGS and produces result/tickets_ui.wasm.
      - name: Build workspace
        run: nix build

      - name: Verify self-contained (host-only imports)
        run: |
          nix shell nixpkgs#wasm-tools --command bash -c '
            set -euo pipefail
            W="$(realpath result)/tickets_ui.wasm"
            wasm-tools validate "$W"
            bad=$(wasm-tools print "$W" | grep -E "^[[:space:]]*\(import " | grep -v "theater:simple/" || true)
            if [ -n "$bad" ]; then echo "::error::non-host imports (recipe not applied):"; echo "$bad"; exit 1; fi
            echo "all residual imports are host theater:simple/* — plain self-contained"
          '

      - name: Create GitHub release and upload artifacts
        run: |
          # Tag was created and pushed by `nix run .#release`. For
          # workflow_dispatch runs synthesize the same shape from HEAD.
          if [ -n "$GITHUB_REF_NAME" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            DATE=$(date +%Y%m%d)
            SHA=$(git rev-parse --short=7 HEAD)
            TAG="release-$DATE-$SHA"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --generate-notes

          STAGE_TAG="${TAG#release-}"
          REPO="${{ github.repository }}"
          WASM="$(realpath result)/tickets_ui.wasm"
          ASSETS=()

          # 1) Plain self-contained wasm — directly loadable (packr 0.11.0), no
          #    composite. Sentinel's `package` field points here via the
          #    canonical release URL.
          cp "$WASM" "tickets_ui-${STAGE_TAG}.wasm"
          chmod +w "tickets_ui-${STAGE_TAG}.wasm"
          ASSETS+=("tickets_ui-${STAGE_TAG}.wasm")

          # 2) Release-flavored manifest with a self-referential package URL.
          #    Mirrors the in-repo ui/manifest.toml handler set. No initial_state
          #    — the spawner provides it (sentinel template / theater spawn API).
          #    No server_tls block — held for the tickets.colinrozzi.com cutover.
          UI_MANIFEST_FILE="tickets-ui-${STAGE_TAG}.toml"
          UI_WASM_URL="https://github.com/${REPO}/releases/download/${TAG}/tickets_ui-${STAGE_TAG}.wasm"
          cat > "${UI_MANIFEST_FILE}" <<TOML
          name = "tickets-ui"
          version = "0.1.0"
          package = "${UI_WASM_URL}"
          static_package = true

          [[handler]]
          type = "runtime"

          [[handler]]
          type = "tcp"
          TOML
          ASSETS+=("${UI_MANIFEST_FILE}")

          # 3) Bundle (humans / local use) + sha256.
          STAGE="tickets-ui-${STAGE_TAG}-wasm32"
          mkdir -p "$STAGE"
          cp "$WASM" "$STAGE/"
          chmod -R +w "$STAGE"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          sha256sum "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

          gh release upload "$TAG" "${ASSETS[@]}" "$STAGE.tar.gz" "$STAGE.tar.gz.sha256"
        env:
          GH_TOKEN: ${{ github.token }}
